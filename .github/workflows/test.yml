name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CI: true
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Validate GH_REPO_READER token
        env:
          TOKEN: ${{ secrets.GH_REPO_READER }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::GH_REPO_READER is not set or empty (checkout will use GITHUB_TOKEN)"
            exit 0
          fi
          resp=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $TOKEN" "https://api.github.com/repos/mitosis-org/protocol")
          if [ "$resp" = "200" ]; then
            echo "GH_REPO_READER is valid (repo read OK)"
          else
            echo "::error::GH_REPO_READER validation failed (HTTP $resp). Check token scope and repo access."
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_REPO_READER }}
          submodules: recursive

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: true

      - name: Yarn Install
        run: yarn install --immutable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Soldeer install
        run: |
          forge soldeer install

      - name: Show Forge version
        run: |
          forge --version

      - name: Run linter checks
        run: |
          yarn lint:check
        id: lint

      - name: Run Forge build
        run: |
          forge build
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test

      - name: Run Forge coverage
        run: |
          sudo apt-get update
          sudo apt-get -y install lcov
          yarn coverage
        id: coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: mitosis-org/protocol
